<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="author" content="Zhang Boyi" />
    <meta name="KEYWORDS" content="Love Diary, Memory, Special Space" />
    <title>Our Exclusive Love Diary</title>
    <!-- 分文件写样式和函数 -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="script.js" defer="defer"></script>
</head>

<body id="main-body">
   
    <audio id="bg-music" src="xiaoban.mp3" loop="loop"></audio>
  
    <div class="container">
        <h1>❤️ 张天帝 &amp; 林林 的专属空间 ❤️</h1>
        
        <div id="countdown">
            <p>我们已经在一起 <span id="days-count">0</span> 天了！</p>
        </div>  

        <div id="countfuture">
            <p>距离下次见面还有 <span id="days-countfuture">0</span> 天！</p>
        </div>
        
        <h2>我们的纪念日 (Anniversaries)</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>日期 (Date)</th>
                    <th>事件 (Event)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026 年 2 月 28 日</td>
                    <td>林林变成张天帝的女朋友啦 🌹</td>
                </tr>
            </tbody>
        </table>

        <button class="heart-btn" onclick="sendLove()">发送一个爱心 (Send Love)</button>
        
    </div>

    <div class="music-ctrl">
        <button onclick="toggleMusic()" style="font-size: 24px; cursor: pointer; border: none; background: none;">🎵</button>
    </div>
    <fieldset>
        <legend>💌 给天帝/林林的留言</legend>
        <form id="message-form" action="" method="get">
            <div style="margin-bottom: 15px; text-align: left;">
                <label for="nickname" style="display: block; margin-bottom: 5px;">昵称 (Nickname):</label>
                <input type="text" id="nickname" name="nickname" placeholder="怎么称呼你呀？" />
            </div>
        
            <div style="margin-bottom: 15px; text-align: left;">
                <label for="message-text" style="display: block; margin-bottom: 5px;">想说的话 (Message):</label>
                <textarea id="message-text" name="message-text" rows="4" placeholder="写下现在的想法..."></textarea>
            </div>

            <div style="text-align: center;">
                <input type="submit" value="确认发送" />
                <input type="reset" value="重填" />
            </div>
        </form>
    </fieldset>

    <div id="display-messages">
        <h3>历史留言</h3>
        <div id="messages-list"></div>
    </div>    
</body>
</html>
