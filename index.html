<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="author" content="Zhang Boyi" />
    <meta name="KEYWORDS" content="Love Diary, Memory, Special Space" />
    <title>Our Exclusive Love Diary</title>
    <!-- 分文件写样式和函数 -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="script.js" defer="defer"></script>
</head>

<body id="main-body">
   
    <audio id="bg-music" src="xiaoban.mp3" loop="loop"></audio>
  
    <div class="container">
        <h1>❤️ 张天帝 &amp; 林林 的专属空间 ❤️</h1>
        
        <div id="countdown">
            <p>我们已经在一起 <span id="days-count">0</span> 天了！</p>
        </div>  

        <div id="countfuture">
            <p>距离下次见面还有 <span id="days-countfuture">0</span> 天！</p>
        </div>
        
        <h2>我们的纪念日 (Anniversaries)</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>日期 (Date)</th>
                    <th>事件 (Event)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026 年 2 月 28 日</td>
                    <td>林林变成张天帝的女朋友啦 🌹</td>
                </tr>
            </tbody>
        </table>

        <button class="heart-btn" onclick="sendLove()">发送一个爱心 (Send Love)</button>
        
    </div>

    <div class="music-ctrl">
        <button onclick="toggleMusic()" style="font-size: 24px; cursor: pointer; border: none; background: none;">🎵</button>
    </div>
    <fieldset>
        <legend>留言板</legend>
        <form id="message-form" action="" method="get">
            <table border="0" style="width:100%;">
                <tr>
                    <td style="width:30%;">昵称：</td>
                    <td>
                        <input type="text" id="nickname" size="30"/>
                    </td>
                </tr>
                <tr>
                    <td>消息：</td>
                    <td>
                        <textarea id="message-text" name="message-text" rows="4" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" style="text-align: center;">
                        <input type="submit" value="Post Message" />
                    
                        <input type="reset" value="Clear" />
                    </td>
                </tr>
            </table>
        </form>
    </fieldset>

    <div id="display-messages">
        <h3>历史留言</h3>
        <div id="messages-list"></div>
    </div>    
</body>
</html>
